name: Build & Deploy to AKS (DEV)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    env:
      SERVICE_NAME: scg-avangrid-backend
      MAVEN_PROFILE: dev
      NAMESPACE: ccaas

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Azure login (same method you already use)
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ACR login (for Jib push)
      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      # Get AKS kubeconfig
      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      # Build + Push image (same behavior as Jenkins deploy stage)
      - name: Maven Deploy (Build + Push)
        run: |
          mvn -B \
            -Dservice-name=${SERVICE_NAME} \
            -DskipTests=true \
            -P${MAVEN_PROFILE} \
            deploy

      # Deploy manifests using JKube
      - name: Deploy to AKS using JKube
        run: |
          mvn -B \
            -DactiveProfiles=${MAVEN_PROFILE} \
            -Dservice-name=${SERVICE_NAME} \
            -DskipTests=true \
            -P${MAVEN_PROFILE} \
            k8s:resource k8s:apply
